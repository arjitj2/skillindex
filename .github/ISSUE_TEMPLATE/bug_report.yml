name: Bug report
description: Report something that is broken or behaving unexpectedly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug. Please include enough detail to make the issue reproducible.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen instead.
      placeholder: Skill Index showed... but I expected...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps someone else can follow.
      placeholder: |
        1. Open...
        2. Click...
        3. See...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Skill Index version
      description: Include the app version if you know it.
      placeholder: "0.1.0"

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste logs, screenshots, or other context that helps explain the issue. Remove secrets, tokens, and private paths first.
      render: text

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I removed secrets, tokens, and private information from this report.
          required: true
        - label: I searched existing issues for a similar report.
          required: true
