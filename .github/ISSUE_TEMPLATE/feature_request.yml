name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: Thanks for sharing an idea. A little workflow context helps keep feature requests concrete.

  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What are you trying to do, and where does the current app get in the way?
      placeholder: When I am managing skills across agents...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or interface you would like to see.
      placeholder: I would like Skill Index to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Share any workaround or other approach you considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Skill inventory
        - MCP inventory
        - Agent inventory
        - Settings
        - Release/install/update
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for a similar request.
          required: true
